name: DC Fleet Daily

on:
  schedule:
    # Three redundant fires per target slot, ~30 min apart.
    # Skip-publish dedupes — only one actually writes per slot.
    # GitHub Actions schedules are best-effort and routinely drop runs;
    # redundancy is the cheapest mitigation.
    #
    # Morning slot (target 8am PDT / 15:00 UTC):
    - cron: '7 15 * * *'    # ~8:07am PDT
    - cron: '37 15 * * *'   # ~8:37am PDT
    - cron: '7 16 * * *'    # ~9:07am PDT
    # Afternoon slot (target 3pm PDT / 22:00 UTC):
    - cron: '7 22 * * *'    # ~3:07pm PDT
    - cron: '37 22 * * *'   # ~3:37pm PDT
    - cron: '7 23 * * *'    # ~4:07pm PDT
  workflow_dispatch: {}

permissions:
  contents: write   # so the job can commit state.json back

concurrency:
  group: dc-fleet-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run report
        env:
          FLEETIO_API_TOKEN: ${{ secrets.FLEETIO_API_TOKEN }}
          FLEETIO_ACCOUNT_TOKEN: ${{ secrets.FLEETIO_ACCOUNT_TOKEN }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_DOMAIN: ${{ secrets.ATLASSIAN_DOMAIN }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          JIRA_PROJECTS: VSTAB,VBUILD,VCO,AVP
        run: python dc_fleet_daily.py

      - name: Commit state.json if changed
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "auto: update state.json [skip ci]"
            git push
          fi
